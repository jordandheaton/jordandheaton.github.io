<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Scroller — Scrub Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scrollbar-width: thin; scrollbar-color: #2a3a55 #04060c; }
  body { background: #04060c; font-family: 'Consolas', 'SF Mono', monospace; }
  #spacer { width: 100%; }
  #view {
    position: fixed; inset: 0; width: 100vw; height: 100vh; display: block;
  }
  .hud {
    position: fixed; left: 24px; bottom: 24px; z-index: 2;
    color: #9fc0ff; text-shadow: 0 1px 6px rgba(0,0,0,.8);
    user-select: none; pointer-events: none;
  }
  .hud .alt { font-size: 30px; font-weight: 700; letter-spacing: .5px; color: #eaf2ff; }
  .hud .label { font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 6px; opacity: .85; }
  .hud .bar {
    margin-top: 12px; width: 220px; height: 2px; background: rgba(159,192,255,.18);
  }
  .hud .bar i { display: block; height: 100%; width: 0; background: #9fc0ff; }
  .hint {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 2;
    color: #eaf2ff; font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    opacity: .75; transition: opacity .6s; pointer-events: none;
    text-shadow: 0 1px 6px rgba(0,0,0,.8);
  }
  .hint.gone { opacity: 0; }
  .hint b { display: block; text-align: center; font-size: 18px; margin-top: 4px; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 50% { transform: translateY(5px); } }
  #loader {
    position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #04060c; color: #9fc0ff; font-size: 12px; letter-spacing: 3px;
    transition: opacity .5s; text-transform: uppercase;
  }
  #loader.gone { opacity: 0; pointer-events: none; }
  #loader .lbar { width: 240px; height: 2px; background: rgba(159,192,255,.18); }
  #loader .lbar i { display: block; height: 100%; width: 0; background: #9fc0ff; transition: width .15s; }
</style>
</head>
<body>
<div id="spacer"></div>
<canvas id="view"></canvas>
<div id="loader"><div>Loading journey</div><div class="lbar"><i id="lfill"></i></div></div>
<div class="hud">
  <div class="alt" id="alt">3.0 km</div>
  <div class="label" id="label">Harbor town</div>
  <div class="bar"><i id="fill"></i></div>
</div>
<div class="hint" id="hint">Scroll to zoom out<b>&#8595;</b></div>

<script>
(() => {
  const FRAME_COUNT = 349;
  const PX_PER_FRAME = 18;               // scroll distance per frame
  const src = i => `frames/frame-${String(i + 1).padStart(3, '0')}.jpg`;

  // Chapters: [startFrame, endFrame, log10 altitude-meters start/end, label]
  // Clip boundaries: 3 clips of ~116 frames each (5s @24fps minus crossfades).
  const CHAPTERS = [
    { f0: 0,   f1: 115, a0: Math.log10(3e3),   a1: Math.log10(3e4),  label: 'Harbor town' },
    { f0: 115, f1: 230, a0: Math.log10(3e4),   a1: Math.log10(3e5),  label: 'Coastal region' },
    { f0: 230, f1: 348, a0: Math.log10(3e5),   a1: Math.log10(4e7),  label: 'Planet Earth' },
  ];

  const canvas = document.getElementById('view');
  const ctx = canvas.getContext('2d');
  const altEl = document.getElementById('alt');
  const labelEl = document.getElementById('label');
  const fillEl = document.getElementById('fill');
  const hintEl = document.getElementById('hint');
  const loaderEl = document.getElementById('loader');
  const lfillEl = document.getElementById('lfill');

  document.getElementById('spacer').style.height =
    (FRAME_COUNT * PX_PER_FRAME + innerHeight) + 'px';

  function sizeCanvas() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
  }
  sizeCanvas();
  addEventListener('resize', () => { sizeCanvas(); dirty = true; });

  // Preload all frames (demo-scale only; the real build windows its decodes)
  const imgs = new Array(FRAME_COUNT);
  let loaded = 0;
  for (let i = 0; i < FRAME_COUNT; i++) {
    const im = new Image();
    im.onload = im.onerror = () => {
      if (++loaded === FRAME_COUNT) loaderEl.classList.add('gone');
      lfillEl.style.width = (loaded / FRAME_COUNT * 100) + '%';
    };
    im.src = src(i);
    imgs[i] = im;
  }

  function coverDraw(im) {
    const cw = canvas.width, ch = canvas.height;
    const iw = im.naturalWidth, ih = im.naturalHeight;
    if (!iw) return;
    const s = Math.max(cw / iw, ch / ih);
    const w = iw * s, h = ih * s;
    ctx.drawImage(im, (cw - w) / 2, (ch - h) / 2, w, h);
  }

  function fmtAltitude(logMeters) {
    const m = Math.pow(10, logMeters);
    if (m < 1e6) return (m / 1e3).toFixed(1) + ' km';
    if (m < 1e9) return Math.round(m / 1e3).toLocaleString() + ' km';
    return (m / 1e9).toFixed(2) + ' million km';
  }

  let playhead = 0;      // eased frame position
  let target = 0;        // scroll-derived frame position
  let shownIdx = -1;
  let dirty = true;

  addEventListener('scroll', () => {
    target = Math.max(0, Math.min(FRAME_COUNT - 1, scrollY / PX_PER_FRAME));
    if (scrollY > 40) hintEl.classList.add('gone');
  }, { passive: true });

  function tick() {
    requestAnimationFrame(tick);
    playhead += (target - playhead) * 0.22;          // ease toward scroll
    if (Math.abs(target - playhead) < 0.01) playhead = target;
    const idx = Math.round(playhead);
    if (idx !== shownIdx || dirty) {
      const im = imgs[idx];
      if (im && im.complete && im.naturalWidth) {
        coverDraw(im);
        shownIdx = idx; dirty = false;
      }
      const ch = CHAPTERS.find(c => idx >= c.f0 && idx <= c.f1) || CHAPTERS[CHAPTERS.length - 1];
      const t = (playhead - ch.f0) / (ch.f1 - ch.f0);
      altEl.textContent = fmtAltitude(ch.a0 + (ch.a1 - ch.a0) * Math.max(0, Math.min(1, t)));
      labelEl.textContent = ch.label;
      fillEl.style.width = (playhead / (FRAME_COUNT - 1) * 100) + '%';
    }
  }
  tick();
})();
</script>
</body>
</html>
