<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Scroller — Leaf to Earth</title>
<meta name="description" content="A Powers-of-Ten style scroll journey: from a single leaf out to the whole Earth.">
<link rel="stylesheet" href="scroller.css?v=1">
</head>
<body>
<div id="spacer"></div>
<canvas id="view"></canvas>
<div id="vignette"></div>

<div class="topbar">
  <span class="title">Universe Scroller</span>
  <a class="back" href="../index.html">&larr; back to portfolio</a>
</div>

<div class="hud">
  <div class="alt" id="alt">10 cm</div>
  <div class="exp" id="exp">10&#8315;&#185; m</div>
  <div class="label" id="label">Leaf</div>
  <div class="bar"><i id="fill"></i></div>
</div>

<div class="hint" id="hint">Scroll to travel<b>&#8595;</b></div>

<div id="loader"><div>Loading journey</div><div class="lbar"><i id="lfill"></i></div></div>

<!-- Manifest inlined so the page works from file:// (double-click) as well as any
     static server. frames/manifest.json is kept on disk as the source of truth. -->
<script type="application/json" id="manifest-data">
{
  "frameCount": 861,
  "pad": 4,
  "pattern": "frames/frame-{i}.jpg",
  "fps": 24,
  "chapters": [
    { "start": 0,   "end": 94,  "label": "Leaf",              "a0": -1.0, "a1": 0.0 },
    { "start": 94,  "end": 185, "label": "Branch",            "a0": 0.0,  "a1": 1.0 },
    { "start": 185, "end": 274, "label": "Whole tree",        "a0": 1.0,  "a1": 2.0 },
    { "start": 274, "end": 354, "label": "Clearing",          "a0": 2.0,  "a1": 3.0 },
    { "start": 354, "end": 425, "label": "Neighborhood",      "a0": 3.0,  "a1": 3.7 },
    { "start": 425, "end": 512, "label": "Coastal town",      "a0": 3.7,  "a1": 4.5 },
    { "start": 512, "end": 547, "label": "Coastal region",    "a0": 4.5,  "a1": 6.3 },
    { "start": 547, "end": 637, "label": "Planet Earth",      "a0": 6.3,  "a1": 7.6 },
    { "start": 637, "end": 688, "label": "Earth–Moon system", "a0": 7.6, "a1": 9.0 },
    { "start": 688, "end": 772, "label": "Inner solar system","a0": 9.0,  "a1": 11.5 },
    { "start": 772, "end": 860, "label": "Outer solar system","a0": 11.5, "a1": 13.0 }
  ]
}
</script>

<script src="scroller.js?v=1"></script>
</body>
</html>
